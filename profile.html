<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="stylesheet" href="assets/profile.css">
</head>
<body>
    <div id="overlay" class="overlay">
        <video id="snow-video" class="snow-video" autoplay muted loop playsinline>
            <source src="assets/snow.mp4" type="video/mp4">
        </video>
        <div class="overlay-content">
            <div class="overlay-title">CLICK TO ENTER</div>
            <div class="overlay-subtitle">TAP ANYWHERE</div>
        </div>
    </div>

    <div class="profile-bg" id="profile-bg">
        <video id="bg-video" autoplay muted loop style="display: none;"></video>
    </div>

    <div class="profile-card">
        <div class="profile-header">
            <div class="avatar-wrap">
                <img id="avatar" class="avatar" src="" alt="Avatar">
                <span class="status-dot" id="status-dot"></span>
            </div>
            <div class="name-block">
                <h1 id="username"></h1>
                <p class="subtitle" id="bio"></p>
            </div>
        </div>

        <div class="social-links" id="social-links">
            <a href="https://www.tiktok.com/@rlph.htrb" target="_blank"><img class="social-logo" src="assets/tiktok.png" alt="TikTok"></a>
            <a href="https://www.youtube.com/@shui7398" target="_blank"><img class="social-logo" src="assets/youtube.png" alt="YouTube"></a>
        </div>

        <div class="view-count">
            <i class="fa-solid fa-eye"></i>
            <span id="view-count">0</span>
        </div>
    </div>

    <div id="audio-player" class="audio-player hidden">
        <div class="audio-header">
            <div class="audio-meta">
                <div class="audio-cover" id="audio-cover"></div>
                <div class="audio-meta-text">
                    <div class="audio-title" id="audio-title">Wish I Never Met You</div>
                    <div class="audio-artist" id="audio-artist">Tory Lanez</div>
                </div>
            </div>
            <button id="audio-menu" class="audio-menu"><i class="fa-solid fa-ellipsis"></i></button>
        </div>
        <div class="audio-controls">
            <button id="audio-prev" class="audio-btn"><i class="fa-solid fa-backward-step"></i></button>
            <button id="audio-play" class="audio-btn"><i class="fa-solid fa-play"></i></button>
            <button id="audio-next" class="audio-btn"><i class="fa-solid fa-forward-step"></i></button>
            <input id="audio-volume" class="audio-volume" type="range" min="0" max="1" step="0.01" value="0.3">
        </div>
    </div>

    <script src="assets/profile.js"></script>
    <script src="assets/snow.js"></script>
</body>
</html>
